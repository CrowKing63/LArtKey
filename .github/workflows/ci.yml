name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore LArtKey/LArtKey.csproj
      - name: Build
        run: dotnet build LArtKey.Tools/LArtKey.Tools.csproj -c Release --no-restore
      - name: Test
        run: dotnet test LArtKey.Tests/LArtKey.Tests.csproj -c Release
