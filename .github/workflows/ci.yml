name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore LAltKey/LAltKey.csproj
          dotnet restore LAltKey.Tools/LAltKey.Tools.csproj
      - name: Build
        run: dotnet build LAltKey.Tools/LAltKey.Tools.csproj -c Release --no-restore
      - name: Test
        run: dotnet test LAltKey.Tests/LAltKey.Tests.csproj -c Release
