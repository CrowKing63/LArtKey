name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: |
          dotnet restore LArtKey/LArtKey.csproj
          dotnet restore LArtKey.Tools/LArtKey.Tools.csproj
      - name: Publish portable single-file
        run: >
          dotnet publish LArtKey/LArtKey.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o dist/publish
      - name: Publish tools app
        run: >
          dotnet publish LArtKey.Tools/LArtKey.Tools.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o dist/publish/Tools
      - name: Package portable ZIP
        run: >
          powershell -ExecutionPolicy Bypass
          -File scripts/package-portable.ps1
          -Version ${{ github.ref_name }}
          -BuildDir dist/publish
      - name: Build Installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + $env:PATH
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer/LArtKey.iss) `
            -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion `"$version`"" |
            Set-Content installer/LArtKey.iss
          iscc installer/LArtKey.iss
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LArtKey-Portable-*.zip
            dist/LArtKey-Setup-*.exe
          fail_on_unmatched_files: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}